name: Terraform CI

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
    push:
      branches: [main]
      paths:
        - "**.tf"
        - "**.tfvars"

env:
  TF_VAR_linode_api_token: ${{ secrets.LINODE_API_TOKEN }}
  TF_VAR_linode_obj_access_key: ${{ secrets.LINODE_OBJ_ACCESS_KEY }}
  TF_VAR_linode_obj_secret_key: ${{ secrets.LINODE_OBJ_SECRET_KEY }}
  TF_VAR_root_password: ${{ secrets.LINODE_ROOT_PASSWORD }}

jobs:
  # lint — chạy mọi PR/push, kiểm tra format + syntax
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # security-scan — tfsec + checkov quét lỗ hổng bảo mật (ví dụ bucket private bị đổi thành public → chặn merge)
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with: soft_fail:false

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

  # plan — chỉ chạy trên PR, show output lên PR comment để team review
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, security-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=environments/production.tfvars -no-color
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan \'${{ steps.plan.outcome }}\'
            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # apply — chỉ chạy khi merge vào main, environment: production yêu cầu manual approval trong GitHub Settings
  apply:
    name: Apply
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == "push"
    needs: [lint, security-scan]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -var-file=environments/production.tfvars -auto-approve
